name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  build:
    # the OS must be GNU/Linux to be able to use the docker-coq-action
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - 'rocq/rocq-prover:9.1'
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: rocq-community/docker-coq-action@v1
        with:
          custom_image: ${{ matrix.image }}
          custom_script: |
            {{before_install}}
            startGroup "Build rocq-s3k-barocq-comp dependencies"
              opam pin add -n -y -k path rocq-s3k-barocq-comp .
              opam update -y
              opam install -y -j $(nproc) rocq-s3k-barocq-comp --deps-only
            endGroup
            startGroup "Build rocq-s3k-barocq-comp"
              opam install -y -v -j $(nproc) rocq-s3k-barocq-comp
              opam list
            endGroup
            startGroup "Build rocq-s3k-barocq dependencies"
              opam pin add -n -y -k path rocq-s3k-barocq .
              opam update -y
              opam install -y -j $(nproc) rocq-s3k-barocq --deps-only
            endGroup
            startGroup "Build rocq-s3k-barocq"
              opam install -y -v -j $(nproc) rocq-s3k-barocq
              opam list
            endGroup
            startGroup "Build rocq-s3k-exec-sem dependencies"
              opam pin add -n -y -k path rocq-s3k-exec-sem .
              opam update -y
              opam install -y -j $(nproc) rocq-s3k-exec-sem --deps-only
            endGroup
            startGroup "Build rocq-s3k-exec-sem"
              opam install -y -v -j $(nproc) rocq-s3k-exec-sem
              opam list
            endGroup
            startGroup "Build rocq-s3k-verif dependencies"
              opam pin add -n -y -k path rocq-s3k-verif .
              opam update -y
              opam install -y -j $(nproc) rocq-s3k-verif --deps-only
            endGroup
            startGroup "Build rocq-s3k-verif"
              opam install -y -v -j $(nproc) rocq-s3k-verif
              opam list
            endGroup
            startGroup "Uninstallation test"
              opam remove -y rocq-s3k-verif
              opam remove -y rocq-s3k-exec-sem
              opam remove -y rocq-s3k-barocq
              opam remove -y rocq-s3k-barocq-comp
            endGroup
